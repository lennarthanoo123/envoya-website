<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Quotes — Envoya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F172A; --card: #0D1520; --border: #1E293B;
      --indigo: #6366F1; --soft: #818CF8;
      --white: #F8FAFC; --gray: #64748B;
      --green: #16A34A; --red: #EF4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      padding: 48px 24px 80px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 680px; margin: 0 auto; }

    /* Header */
    .page-header {
      display: flex; align-items: center;
      padding-bottom: 20px; margin-bottom: 28px;
      border-bottom: 0.5px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-name { font-size: 16px; font-weight: 300; letter-spacing: 0.1em; color: var(--white); }
    .page-title-badge {
      margin-left: auto;
      font-size: 11px; font-weight: 700;
      color: var(--soft);
      background: rgba(129,140,248,0.1);
      border: 0.5px solid rgba(129,140,248,0.25);
      border-radius: 20px; padding: 3px 12px;
    }

    /* Quote card */
    .q-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .q-card:hover { border-color: var(--indigo); }

    .q-card-left {}
    .q-card-num {
      font-size: 11px; font-weight: 700;
      color: var(--indigo); font-family: 'Inter', monospace;
      margin-bottom: 4px;
    }
    .q-card-client { font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
    .q-card-pkg { font-size: 11px; color: var(--gray); }

    .q-card-right {
      display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .q-card-meta { text-align: right; }
    .q-card-amount { font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
    .q-card-date { font-size: 10px; color: var(--gray); }

    /* Status badge */
    .status {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      border-radius: 20px; padding: 3px 10px;
      border: 0.5px solid;
    }
    .status-draft    { color: #94A3B8; border-color: #334155; background: rgba(51,65,85,0.3); }
    .status-sent     { color: #FBBF24; border-color: #92400E; background: rgba(146,64,14,0.15); }
    .status-accepted { color: var(--green); border-color: var(--green); background: rgba(22,163,74,0.1); }
    .status-declined { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.1); }

    /* View button */
    .view-btn {
      display: inline-block;
      background: var(--indigo);
      color: #fff;
      text-decoration: none;
      font-size: 11px; font-weight: 600;
      border-radius: 6px; padding: 6px 14px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .view-btn:hover { background: #4F46E5; }

    /* Empty */
    .empty { color: var(--gray); font-size: 13px; padding: 40px 0; text-align: center; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#818CF8" stroke-width="0.8" stroke-dasharray="2.5 2.5" opacity="0.5"/>
        <circle cx="20" cy="20" r="11" stroke="#818CF8" stroke-width="0.8" stroke-dasharray="2.5 2.5" opacity="0.5"/>
        <circle cx="20" cy="20" r="5" fill="#6366F1"/>
        <circle cx="20" cy="20" r="2.5" fill="#fff"/>
        <circle cx="31" cy="9" r="3.5" fill="#818CF8"/>
      </svg>
      <span class="logo-name">envoya</span>
    </div>
    <span class="page-title-badge">Quotes</span>
  </div>

  <div id="quotes-list"></div>

</div>

<script>
// ── All quotes listed here ───────────────────────────
// To add a quote: duplicate quote-data.js as quote-ENV-2026-XXX.js
// and add an entry below with the matching id.
const quotes = [
  {
    id: "ENV-2026-002",
    client: "Elision BV",
    package: "Lead Machine — Complete Package",
    date: "19-03-2026",
    valid_until: "07-04-2026",
    amount: 24999.81,
    status: "Sent"
  }
  // Add more quotes here ↓
  // { id: "ENV-2026-003", client: "...", package: "...", date: "...", valid_until: "...", amount: 0, status: "Draft" }
];

const statusClass = {
  Draft: 'status-draft',
  Sent: 'status-sent',
  Accepted: 'status-accepted',
  Declined: 'status-declined'
};

const fmt = (n) => '€\u00a0' + n.toLocaleString('nl-NL', {
  minimumFractionDigits: 2, maximumFractionDigits: 2
});

const list = document.getElementById('quotes-list');

if (quotes.length === 0) {
  list.innerHTML = '<div class="empty">No quotes yet.</div>';
} else {
  list.innerHTML = quotes.map(q => `
    <div class="q-card">
      <div class="q-card-left">
        <div class="q-card-num">${q.id}</div>
        <div class="q-card-client">${q.client}</div>
        <div class="q-card-pkg">${q.package}</div>
      </div>
      <div class="q-card-right">
        <div class="q-card-meta">
          <div class="q-card-amount">${fmt(q.amount)}</div>
          <div class="q-card-date">${q.date} · valid until ${q.valid_until}</div>
        </div>
        <span class="status ${statusClass[q.status] || 'status-draft'}">${q.status}</span>
        <a href="quote.html?id=${q.id}" class="view-btn">View quote</a>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
