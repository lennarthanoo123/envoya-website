<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envoya — Architecture Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #F8FAFC;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.widget {
  width: 100%;
  max-width: 720px;
  background: #0c1220;
  border-radius: 20px;
  padding: 36px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

/* Background grid */
.widget::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Header */
.w-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  position: relative;
}
.w-title {
  font-size: 11px;
  font-weight: 700;
  color: #475569;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.w-live {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  color: #4ade80;
  letter-spacing: 0.06em;
}
.w-live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ade80;
  animation: livepulse 1.5s ease-in-out infinite;
}
@keyframes livepulse {
  0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
  50% { opacity:0.7; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
}

/* SVG stage */
.w-stage {
  position: relative;
  width: 100%;
}
svg.arch {
  width: 100%;
  height: auto;
  overflow: visible;
}

/* Nodes */
.node {
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
              transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.node.visible {
  opacity: 1;
  transform: scale(1);
}
.node.active .node-box {
  filter: drop-shadow(0 0 12px rgba(99,102,241,0.5));
}
.node.deal .node-box {
  filter: drop-shadow(0 0 12px rgba(74,222,128,0.6));
}

/* Paths */
.conn-path {
  stroke-dasharray: 300;
  stroke-dashoffset: 300;
  transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.conn-path.drawn {
  stroke-dashoffset: 0;
}

/* Traveling dot */
.travel-dot {
  opacity: 0;
}
.travel-dot.active {
  animation: travel 1.2s ease-in-out forwards;
}
@keyframes travel {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { opacity: 0; }
}

/* Step label */
.w-step {
  margin-top: 24px;
  padding: 12px 16px;
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 52px;
  position: relative;
}
.w-step-num {
  font-size: 10px;
  font-weight: 800;
  color: #6366f1;
  background: rgba(99,102,241,0.15);
  border-radius: 4px;
  padding: 2px 7px;
  flex-shrink: 0;
}
.w-step-text {
  font-size: 13px;
  color: #cbd5e1;
  font-weight: 500;
  line-height: 1.5;
  transition: opacity 0.3s;
}

/* Progress */
.w-progress {
  height: 2px;
  background: #1e293b;
  border-radius: 99px;
  margin-top: 20px;
  overflow: hidden;
}
.w-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #818cf8);
  width: 0%;
  transition: width 0.1s linear;
}

/* Replay */
.w-replay {
  text-align: center;
  margin-top: 16px;
}
.w-replay button {
  background: rgba(99,102,241,0.15);
  color: #818cf8;
  border: 1px solid rgba(99,102,241,0.3);
  padding: 8px 20px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.w-replay button:hover {
  background: rgba(99,102,241,0.25);
  color: #a5b4fc;
}
</style>
</head>
<body>

<div style="max-width:740px;width:100%;">
  <p style="font-family:Inter,sans-serif;font-size:12px;color:#94a3b8;text-align:center;margin-bottom:16px;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;">Envoya Lead Machine — System Architecture</p>

  <div class="widget">
    <div class="w-header">
      <span class="w-title">How Lead Machine works</span>
      <span class="w-live"><span class="w-live-dot"></span>RUNNING 24/7</span>
    </div>

    <div class="w-stage">
      <svg class="arch" viewBox="0 0 640 320" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- ── CONNECTION PATHS ── -->

        <!-- Lead DB → ICP Engine -->
        <path id="p1" class="conn-path" d="M 168 100 L 252 100" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.6"/>
        <!-- ICP Engine → Email Writer -->
        <path id="p2" class="conn-path" d="M 388 100 L 472 100" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.6"/>
        <!-- Email Writer → Outreach -->
        <path id="p3" class="conn-path" d="M 556 140 L 556 200" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.6"/>
        <!-- Outreach → Learning Engine -->
        <path id="p4" class="conn-path" d="M 472 240 L 388 240" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.6"/>
        <!-- Learning Engine → ICP Engine (feedback loop) -->
        <path id="p5" class="conn-path" d="M 320 200 L 320 140" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.6"/>
        <!-- Deal result node from Outreach -->
        <path id="p6" class="conn-path" d="M 556 240 L 472 300 L 168 300 L 84 240" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>

        <!-- ── TRAVELING DOTS ── -->
        <circle id="d1" class="travel-dot" r="4" fill="#6366f1">
          <animateMotion id="d1anim" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1">
            <mpath href="#p1"/>
          </animateMotion>
        </circle>
        <circle id="d2" class="travel-dot" r="4" fill="#6366f1">
          <animateMotion id="d2anim" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1">
            <mpath href="#p2"/>
          </animateMotion>
        </circle>
        <circle id="d3" class="travel-dot" r="4" fill="#4ade80">
          <animateMotion id="d3anim" dur="1s" fill="freeze">
            <mpath href="#p3"/>
          </animateMotion>
        </circle>
        <circle id="d4" class="travel-dot" r="4" fill="#818cf8">
          <animateMotion id="d4anim" dur="1.2s" fill="freeze">
            <mpath href="#p4"/>
          </animateMotion>
        </circle>
        <circle id="d5" class="travel-dot" r="4" fill="#818cf8">
          <animateMotion id="d5anim" dur="0.8s" fill="freeze">
            <mpath href="#p5"/>
          </animateMotion>
        </circle>

        <!-- ── NODES ── -->

        <!-- Node 1: Lead Database (top-left) -->
        <g id="n1" class="node" style="transition-delay:0s">
          <rect class="node-box" x="4" y="60" width="164" height="80" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1.5"/>
          <text x="86" y="90" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="0.08em">LEAD DATABASE</text>
          <text x="86" y="107" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="900" fill="#6366f1" letter-spacing="-0.02em">275M+</text>
          <text x="86" y="124" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#334155">contacts · live data</text>
        </g>

        <!-- Node 2: ICP Engine (top-center) -->
        <g id="n2" class="node" style="transition-delay:0.15s">
          <rect class="node-box" x="252" y="60" width="136" height="80" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1.5"/>
          <text x="320" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#6366f1" letter-spacing="0.08em">ICP ENGINE</text>
          <text x="320" y="105" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Score · Rank · Filter</text>
          <text x="320" y="122" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#334155">top 10% only</text>
        </g>

        <!-- Node 3: Email Writer (top-right) -->
        <g id="n3" class="node" style="transition-delay:0.3s">
          <rect class="node-box" x="472" y="60" width="164" height="80" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1.5"/>
          <text x="554" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="0.08em">EMAIL WRITER</text>
          <text x="554" y="105" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">AI + Signal</text>
          <text x="554" y="122" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#334155">16–26% reply rate</text>
        </g>

        <!-- Node 4: Outreach (right) -->
        <g id="n4" class="node" style="transition-delay:0.45s">
          <rect class="node-box" x="472" y="200" width="164" height="80" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1.5"/>
          <text x="554" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="0.08em">OUTREACH</text>
          <text x="554" y="246" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Send · Track · Reply</text>
          <text x="554" y="263" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#334155">auto-routed to you</text>
        </g>

        <!-- Node 5: Learning Engine (center-bottom) -->
        <g id="n5" class="node" style="transition-delay:0.6s">
          <rect class="node-box" x="252" y="200" width="136" height="80" rx="12" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
          <text x="320" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#818cf8" letter-spacing="0.08em">SELF-LEARNING</text>
          <text x="320" y="246" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">ICP auto-updates</text>
          <text x="320" y="263" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#818cf8">after every deal</text>
        </g>

        <!-- Node 6: Pipeline / Result (left-bottom) -->
        <g id="n6" class="node" style="transition-delay:0.75s">
          <rect class="node-box" x="4" y="200" width="164" height="80" rx="12" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
          <text x="86" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#4ade80" letter-spacing="0.08em">YOUR PIPELINE</text>
          <text x="86" y="246" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="900" fill="#4ade80" letter-spacing="-0.02em">35+</text>
          <text x="86" y="263" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#4ade80">meetings / 90 days</text>
        </g>

        <!-- Center label -->
        <g id="n-center" class="node" style="transition-delay:0.5s">
          <circle cx="320" cy="160" r="24" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-dasharray="3 3"/>
          <text x="320" y="156" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="800" fill="#6366f1" letter-spacing="0.08em">ENVOYA</text>
          <text x="320" y="167" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#818cf8">AGENT</text>
        </g>

      </svg>
    </div>

    <div class="w-step">
      <span class="w-step-num" id="step-num">01</span>
      <span class="w-step-text" id="step-text">Lead Machine scans 275M+ contacts and finds the right person at the right company.</span>
    </div>

    <div class="w-progress"><div class="w-progress-bar" id="prog"></div></div>
  </div>

  <div class="w-replay" style="margin-top:16px;">
    <button onclick="run()">▶ Replay</button>
  </div>
</div>

<script>
const STEPS = [
  { num:'01', text:'Lead Machine scans 275M+ contacts and finds the right person at the right company.', node:'n1', path:'p1', dot:'d1' },
  { num:'02', text:'The ICP Engine scores every lead — only the top 10% make it through.', node:'n2', path:'p2', dot:'d2', activate:'n2' },
  { num:'03', text:'The AI Email Writer detects a signal and writes a personalised message. 16–26% reply rate.', node:'n3', path:'p3', dot:'d3', activate:'n3' },
  { num:'04', text:'Email sent automatically. Replies are routed to you. Warm leads tracked in your dashboard.', node:'n4', path:null, dot:'d3', activate:'n4' },
  { num:'05', text:'Every reply and every deal trains the ICP Engine. The system gets smarter over time.', node:'n5', path:'p4', dot:'d4', activate:'n5' },
  { num:'06', text:'Result: 35+ qualified meetings booked in 90 days. Your pipeline fills while you sleep.', node:'n6', path:'p6', dot:null, activate:'n6' },
];

const TOTAL = 16000;
let timers = [];
let progInterval = null;

function stop() {
  timers.forEach(clearTimeout);
  timers = [];
  if (progInterval) clearInterval(progInterval);
}

function later(fn, ms) { timers.push(setTimeout(fn, ms)); }

function setStep(s) {
  const el = document.getElementById('step-text');
  el.style.opacity = '0';
  setTimeout(function() {
    document.getElementById('step-num').textContent = s.num;
    el.textContent = s.text;
    el.style.opacity = '1';
  }, 200);
}

function drawPath(id) {
  const p = document.getElementById(id);
  if (!p) return;
  const len = p.getTotalLength ? p.getTotalLength() : 200;
  p.style.strokeDasharray = len;
  p.style.strokeDashoffset = len;
  p.style.transition = 'stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1)';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      p.style.strokeDashoffset = '0';
    });
  });
}

function animDot(id) {
  const d = document.getElementById(id);
  if (!d) return;
  d.style.opacity = '1';
  const anim = d.querySelector('animateMotion');
  if (anim) {
    anim.beginElement();
    setTimeout(function() { d.style.opacity = '0'; }, 1500);
  }
}

function activateNode(id) {
  const n = document.getElementById(id);
  if (n) n.classList.add('active');
}

function run() {
  stop();

  // Reset all
  document.querySelectorAll('.node').forEach(function(n) {
    n.classList.remove('visible','active','deal');
    n.style.transitionDelay = n.dataset.origDelay || '0s';
  });
  document.querySelectorAll('.conn-path').forEach(function(p) {
    const len = 300;
    p.style.strokeDasharray = len;
    p.style.strokeDashoffset = len;
    p.style.transition = 'none';
  });
  document.querySelectorAll('.travel-dot').forEach(function(d) {
    d.style.opacity = '0';
  });
  document.getElementById('prog').style.width = '0%';
  setStep(STEPS[0]);

  // Show all nodes first with stagger
  document.querySelectorAll('.node').forEach(function(n, i) {
    later(function() { n.classList.add('visible'); }, 100 + i * 150);
  });

  // Step sequence
  const TIMINGS = [0, 2200, 4400, 6600, 8800, 11200];

  STEPS.forEach(function(step, i) {
    later(function() {
      setStep(step);
      if (step.path) drawPath(step.path);
      if (step.dot) later(function() { animDot(step.dot); }, 400);
      if (step.activate) later(function() { activateNode(step.activate); }, 600);
      if (i === STEPS.length - 1) {
        later(function() {
          document.getElementById('n6').classList.add('deal');
        }, 800);
      }
    }, TIMINGS[i]);
  });

  // Progress bar
  let elapsed = 0;
  progInterval = setInterval(function() {
    elapsed += 100;
    document.getElementById('prog').style.width = Math.min(100, (elapsed / TOTAL) * 100) + '%';
    if (elapsed >= TOTAL) {
      clearInterval(progInterval);
      later(function() { run(); }, 1500);
    }
  }, 100);
  timers.push(progInterval);
}

// Store original delays
document.querySelectorAll('.node').forEach(function(n) {
  n.dataset.origDelay = n.style.transitionDelay || '0s';
});

run();
</script>
</body>
</html>
